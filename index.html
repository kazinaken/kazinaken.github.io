<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Вход - Админ Панель</title>
<link rel="icon" type="image/png" href="css/png/logo.png">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page">

<div class="topbar">
    <button class="btn btn-outline-secondary" id="themeBtn">
        <i class="bi bi-moon"></i>
    </button>
</div>

<div class="login-container">
    <div class="card login-card">
        <div class="login-header">
            <img src="css/png/logo.png" alt="logo" width="50" height="50">
            <h3 class="mt-2">Вход в систему</h3>
        </div>
        
        <div class="login-body">
            <form id="loginForm">
                <div class="mb-3">
                    <input type="text" class="form-control" id="login" placeholder="Логин" required>
                </div>
                
                <div class="mb-3">
                    <input type="password" class="form-control" id="password" placeholder="Пароль" required>
                </div>
                
                <button type="submit" class="btn btn-primary btn-login">Войти</button>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/app.js"></script>

</body>
</html>
