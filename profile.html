<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Профиль - Админ Панель</title>
<link rel="icon" type="image/png" href="css/png/logo.png">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<button class="menu-toggle" id="menuToggle">
    <i class="bi bi-list"></i>
</button>

<div class="wrapper">
    <aside class="sidebar" id="sidebar">
        <h3 class="logo">
             <img src="css/png/logo.png" alt="logo" width="30" height="30">
            AdminLTE
        </h3>
        <nav>
            <a href="glav.html">
                    Главная
            </a>
            <a href="users.html">
                <i class="bi bi-people"></i> Пользователи
            </a>
            <a href="products.html">
                <i class="bi bi-box"></i> Товары
            </a>
            <a href="orders.html">
                <i class="bi bi-cart"></i> Заказы
            </a>
        </nav>
    </aside>

    <main class="main-content">
        <div class="topbar">
            <button class="btn btn-outline-secondary" id="themeBtn">
                <i class="bi bi-moon"></i>
            </button>
            <a href="profile.html" class="profile-link">
                <i class="bi bi-person-circle"></i>
                Admin
            </a>
        </div>

        <div class="row">
            <div class="col-lg-4 mb-4">
                <div class="card text-center">
                    <div class="card-body">
                        <div class="profile-avatar">
                            <i class="bi bi-person-circle"></i>
                        </div>
                        <h3 id="profileName">Admin</h3>
                        <p class="text-muted" id="profileRole">Супер Администратор</p>
                        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#profileModal">
                            <i class="bi bi-pencil"></i> Редактировать профиль
                        </button>
                    </div>
                </div>
            </div>

            <div class="col-lg-8">
                <div class="card">
                    <div class="card-header">
                        <h5 class="mb-0"><i class="bi bi-info-circle"></i> Информация о пользователе</h5>
                    </div>
                    <div class="card-body">
                        <div class="profile-info-item">
                            <label>Email</label>
                            <p id="profileEmail" class="mb-0">admin@example.com</p>
                        </div>
                        <div class="profile-info-item">
                            <label>Дата регистрации</label>
                            <p id="profileJoinDate" class="mb-0">2024-01-01</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>



<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/app.js"></script>
</body>
</html>
